name: node-ci
on:
  push:
    paths-ignore: ["contracts/**"]
  pull_request:
    paths-ignore: ["contracts/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm install
      - run: npm run build
      - run: npm run lint --if-present
